// ─── Detail Panel ─────────────────────────────────────────────────────────────
const DetailPanel = ({ item, onClose, onApprove, onReject }) => {
  if (!item) return null;
  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(13,17,23,0.45)', zIndex: 100, display: 'flex', alignItems: 'flex-start', justifyContent: 'flex-end' }}

          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px 20px', marginBottom: 16 }}>

          <div style={{ background: '#F4F5F7', border: '1px solid #E8EAED', borderRadius: 4, padding: '12px', marginBottom: 16 }}>

          <div style={{ padding: '12px', fontSize: 13, color: '#8A95A3', textAlign: 'center' }}>No priority items.</div>

};

// ─── Submissions Screen ────────────────────────────────────────────────────────
const SubmissionsScreen = ({ items, selectedIds, onSelect, onSelectAll, onView, onApprove, onReject, onBulkApprove }) => {
  const [search, setSearch] = React.useState('');
  const [statusFilter, setStatusFilter] = React.useState('all');
  const [typeFilter, setTypeFilter] = React.useState('all');

  const filtered = items.filter(item => {
    const matchSearch = !search || item.title.toLowerCase().includes(search.toLowerCase()) || item.author.toLowerCase().includes(search.toLowerCase());
    const matchStatus = statusFilter === 'all' || item.status === statusFilter;
    const matchType   = typeFilter   === 'all' || item.type   === typeFilter;
    return matchSearch && matchStatus && matchType;
  });

  const allSelected = filtered.length > 0 && filtered.every(i => selectedIds.includes(i.id));

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <FilterBar
        search={search} onSearch={setSearch}
        statusFilter={statusFilter} onStatusFilter={setStatusFilter}
        typeFilter={typeFilter} onTypeFilter={setTypeFilter}
        selectedCount={selectedIds.length}
        onBulkApprove={onBulkApprove}
      />
      <div style={{ flex: 1, overflow: 'auto' }}>
        <TableHeader allSelected={allSelected} onSelectAll={() => onSelectAll(filtered.map(i => i.id))} />
        {filtered.map(item => (
          <ItemRow
            key={item.id} item={item}
            isSelected={selectedIds.includes(item.id)}
            onSelect={onSelect} onView={onView} onApprove={onApprove} onReject={onReject}
          />
        ))}
        {filtered.length === 0 && (
          <div style={{ padding: '32px', textAlign: 'center', color: '#8A95A3', fontSize: 13 }}>No items match your filters.</div>
        )}
        <div style={{ padding: '8px 12px', fontSize: 11, color: '#8A95A3', borderTop: '1px solid #E8EAED', background: '#F9FAFB' }}>
          Showing {filtered.length} of {items.length} items
        </div>
      </div>
    </div>
  );
};

// ─── Activity Feed Screen ──────────────────────────────────────────────────────
const ActivityFeedScreen = ({ items, onView }) => {
  const actionColors = { approve: '#1A7F4B', reject: '#C0392B', flag: '#B8860B', submit: '#005BBB' };
  const actionIcons = {
    approve: <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>,
    reject:  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    flag:    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>,
    submit:  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>,
  };

  return (
    <div style={{ flex: 1, overflow: 'auto' }}>
      <div style={{ margin: '16px', background: 'white', border: '1px solid #DDE1E7', borderRadius: 4, overflow: 'hidden' }}>
        <div style={{ padding: '8px 12px', background: '#F9FAFB', borderBottom: '1px solid #DDE1E7', display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.07em', color: '#4A5568' }}>Recent Activity</span>
          <CountBadge count={ACTIVITY_LOG.length} variant="default" />
        </div>
        {ACTIVITY_LOG.map(log => (
          <div key={log.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 12px', borderBottom: '1px solid #F4F5F7' }}>

              {actionIcons[log.type]}
            </div>
            <div style={{ flex: 1, overflow: 'hidden' }}>
              <span style={{ fontSize: 13, fontWeight: 500, color: '#0D1117' }}>{log.actor} </span>
              <span style={{ fontSize: 13, color: '#4A5568' }}>{log.action} — </span>
              <span style={{ fontSize: 13, color: '#005BBB', cursor: 'pointer', textDecoration: 'underline' }} onClick={() => { const item = items.find(i => i.title.startsWith(log.item.split(' — ')[0])); if (item) onView(item); }}>{log.item}</span>

        ))}

      {/* All items feed */}

        <div style={{ padding: '8px 12px', background: '#F9FAFB', borderBottom: '1px solid #DDE1E7' }}>
          <span style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.07em', color: '#4A5568' }}>All Items</span>
        </div>
        {items.map(item => (
          <ItemRow key={item.id} item={item} onView={onView} compact />
        ))}

};

    <div style={{ fontSize: 12 }}>Screen not yet implemented in this prototype</div>

// ─── Root App ─────────────────────────────────────────────────────────────────
const App = () => {
  const [activeId, setActiveId]     = React.useState('dashboard');
  const [items, setItems]           = React.useState(ALL_ITEMS);
  const [selectedIds, setSelected]  = React.useState([]);
  const [detailItem, setDetailItem] = React.useState(null);
  const [search, setSearch]         = React.useState('');

  const handleApprove = (id) => setItems(prev => prev.map(i => i.id === id ? { ...i, status: 'APPROVED' } : i));
  const handleReject  = (id) => setItems(prev => prev.map(i => i.id === id ? { ...i, status: 'REJECTED' } : i));
  const handleSelect  = (id) => setSelected(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  const handleSelectAll = (ids) => setSelected(prev => ids.every(id => prev.includes(id)) ? prev.filter(id => !ids.includes(id)) : [...new Set([...prev, ...ids])]);
  const handleBulkApprove = () => { selectedIds.forEach(id => handleApprove(id)); setSelected([]); };

  const screenItems = activeId === 'flagged'
    ? items.filter(i => i.status === 'HIGH PRIORITY' || i.status === 'URGENT')
    : activeId === 'events'
    ? items.filter(i => i.type === 'Event')
    : activeId === 'enrollments'
    ? items.filter(i => i.type === 'Enrollment')
    : items;

  const renderScreen = () => {
    switch (activeId) {
      case 'dashboard':   return <DashboardScreen items={items} onView={setDetailItem} onApprove={handleApprove} onReject={handleReject} />;
      case 'activity':    return <ActivityFeedScreen items={items} onView={setDetailItem} />;
      case 'submissions': return <SubmissionsScreen items={items} selectedIds={selectedIds} onSelect={handleSelect} onSelectAll={handleSelectAll} onView={setDetailItem} onApprove={handleApprove} onReject={handleReject} onBulkApprove={handleBulkApprove} />;
      case 'flagged':
      case 'events':
      case 'enrollments': return <SubmissionsScreen items={screenItems} selectedIds={selectedIds} onSelect={handleSelect} onSelectAll={handleSelectAll} onView={setDetailItem} onApprove={handleApprove} onReject={handleReject} onBulkApprove={handleBulkApprove} />;
      default:            return <PlaceholderScreen title={activeId.charAt(0).toUpperCase() + activeId.slice(1)} />;
    }
  };

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar activeId={activeId} onNavigate={id => { setActiveId(id); setSelected([]); }} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <Header activeId={activeId} searchValue={search} onSearch={setSearch} />
        <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
          {renderScreen()}
        </div>
      </div>
      {detailItem && (
        <DetailPanel item={detailItem} onClose={() => setDetailItem(null)} onApprove={handleApprove} onReject={handleReject} />
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
