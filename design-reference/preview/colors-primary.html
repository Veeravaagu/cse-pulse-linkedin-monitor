<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: #F4F5F7; padding: 16px; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; }
  .chip { width: 80px; height: 48px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.08); }
  .chip.border { border: 1px solid #DDE1E7; }
  .name { font-size: 10px; font-weight: 600; color: #4A5568; margin-top: 4px; letter-spacing: 0.03em; }
  .hex  { font-size: 10px; color: #8A95A3; font-family: 'IBM Plex Mono', monospace; }
  .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #8A95A3; margin-bottom: 6px; }
</style>
</head>
<body>
  <div class="section-label">Brand Primary</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#004A99"></div><div class="name">Blue Deeper</div><div class="hex">#004A99</div></div>
    <div class="swatch"><div class="chip" style="background:#005BBB"></div><div class="name">UB Blue</div><div class="hex">#005BBB</div></div>
    <div class="swatch"><div class="chip" style="background:#3380CC"></div><div class="name">Blue Mid</div><div class="hex">#3380CC</div></div>
    <div class="swatch"><div class="chip" style="background:#C5D6EF"></div><div class="name">Blue Muted</div><div class="hex">#C5D6EF</div></div>
    <div class="swatch"><div class="chip" style="background:#EEF2F8"></div><div class="name">Blue Tint</div><div class="hex">#EEF2F8</div></div>
  </div>
  <div class="section-label" style="margin-top:10px">Brand Accent</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#B8860B"></div><div class="name">Gold Dark</div><div class="hex">#B8860B</div></div>
    <div class="swatch"><div class="chip" style="background:#FFB81C"></div><div class="name">UB Gold</div><div class="hex">#FFB81C</div></div>
    <div class="swatch"><div class="chip" style="background:#FFD98A"></div><div class="name">Gold Light</div><div class="hex">#FFD98A</div></div>
    <div class="swatch"><div class="chip" style="background:#FFFBEB"></div><div class="name">Gold Tint</div><div class="hex">#FFFBEB</div></div>
  </div>
</body>
</html>
