<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: #F4F5F7; padding: 14px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .card { background: white; border: 1px solid #DDE1E7; border-radius: 4px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; }
  .dot { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; }
  .label { font-size: 12px; font-weight: 600; color: #0D1117; }
  .hex   { font-size: 10px; color: #8A95A3; font-family: 'IBM Plex Mono', monospace; }
  .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #8A95A3; margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="section-label">Semantic Status Colors</div>
  <div class="grid">
    <div class="card" style="background:#EAF5EE; border-color:#A3D4B5">
      <div class="dot" style="background:#1A7F4B"></div>
      <div><div class="label">Approve</div><div class="hex">#1A7F4B</div></div>
    </div>
    <div class="card" style="background:#FDECEB; border-color:#F0A99F">
      <div class="dot" style="background:#C0392B"></div>
      <div><div class="label">Reject</div><div class="hex">#C0392B</div></div>
    </div>
    <div class="card" style="background:#FFFBEB; border-color:#F0D080">
      <div class="dot" style="background:#B8860B"></div>
      <div><div class="label">Warning / Flag</div><div class="hex">#B8860B</div></div>
    </div>
    <div class="card" style="background:#EEF2F8; border-color:#C5D6EF">
      <div class="dot" style="background:#005BBB"></div>
      <div><div class="label">Info / Primary</div><div class="hex">#005BBB</div></div>
    </div>
    <div class="card" style="background:#FFFBEB; border-color:#F0D080">
      <div class="dot" style="background:#FFB81C"></div>
      <div><div class="label">High Priority</div><div class="hex">#FFB81C</div></div>
    </div>
    <div class="card" style="background:#F9FAFB; border-color:#DDE1E7">
      <div class="dot" style="background:#8A95A3"></div>
      <div><div class="label">Neutral / Muted</div><div class="hex">#8A95A3</div></div>
    </div>
    <div class="card" style="background:#F4F5F7; border-color:#DDE1E7">
      <div class="dot" style="background:#4A5568"></div>
      <div><div class="label">Pending</div><div class="hex">#4A5568</div></div>
    </div>
    <div class="card" style="background:#EEF2F8; border-color:#C5D6EF">
      <div class="dot" style="background:#3380CC"></div>
      <div><div class="label">Active / In Review</div><div class="hex">#3380CC</div></div>
    </div>
  </div>
</body>
</html>
