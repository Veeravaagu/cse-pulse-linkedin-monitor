<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: #F4F5F7; padding: 14px; }
  .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #8A95A3; margin-bottom: 10px; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .stat { background: white; border: 1px solid #DDE1E7; border-radius: 4px; padding: 12px 14px; }
  .stat-val { font-family: 'IBM Plex Mono', monospace; font-size: 24px; font-weight: 700; color: #0D1117; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 11px; color: #8A95A3; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  .stat-delta { font-size: 11px; margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }
  .up   { color: #1A7F4B; }
  .down { color: #C0392B; }
  .stat.alert { border-color: #F0A99F; background: #FDECEB; }
  .stat.alert .stat-val { color: #C0392B; }
  .stat.warn  { border-color: #F0D080; background: #FFFBEB; }
  .stat.warn  .stat-val { color: #B8860B; }
  .stat-top { display: flex; align-items: flex-start; justify-content: space-between; }
</style>
</head>
<body>
  <div class="label">Stats Panel</div>
  <div class="stats-grid">
    <div class="stat warn">
      <div class="stat-top">
        <div class="stat-val">07</div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#B8860B" stroke-width="1.5"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
      </div>
      <div class="stat-label">High Priority</div>
      <div class="stat-delta up">↑ 3 since yesterday</div>
    </div>
    <div class="stat alert">
      <div class="stat-top">
        <div class="stat-val">03</div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C0392B" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div>
      <div class="stat-label">Urgent Flags</div>
      <div class="stat-delta down">↑ 1 new today</div>
    </div>
    <div class="stat">
      <div class="stat-top">
        <div class="stat-val">48</div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8A95A3" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div class="stat-label">Pending Review</div>
      <div class="stat-delta" style="color:#8A95A3">— no change</div>
    </div>
    <div class="stat">
      <div class="stat-top">
        <div class="stat-val" style="color:#1A7F4B">124</div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1A7F4B" stroke-width="1.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="stat-label">Resolved This Week</div>
      <div class="stat-delta down">↓ 8 vs. last week</div>
    </div>
  </div>
</body>
</html>
