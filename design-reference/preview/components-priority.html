<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: #F4F5F7; padding: 14px; }
  .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #8A95A3; margin-bottom: 8px; }
  .priority-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #FFFBEB; border-left: 3px solid #FFB81C; border-bottom: 1px solid #F0D080; }
  .normal-row   { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: white; border-bottom: 1px solid #E8EAED; }
  .normal-row:hover { background: #EEF2F8; }
  .flag { flex-shrink: 0; }
  .title { font-size: 13px; font-weight: 500; color: #0D1117; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .title.pri { color: #7A5B00; }
  .meta { font-size: 11px; color: #8A95A3; font-family: 'IBM Plex Mono', monospace; flex-shrink: 0; }
  .badge { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; padding: 2px 6px; border-radius: 2px; flex-shrink: 0; }
  .actions { display: flex; gap: 4px; flex-shrink: 0; }
  .btn-xs { font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; font-weight: 500; border: none; cursor: pointer; padding: 3px 8px; border-radius: 2px; }
</style>
</head>
<body>
  <div class="label">Priority vs. Normal Rows</div>

  <div class="priority-row">
    <svg class="flag" width="13" height="13" viewBox="0 0 24 24" fill="#FFB81C" stroke="#B8860B" stroke-width="1.5"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
    <span class="title pri">CSE 442 Final Project — Group 7 — Overdue submission review</span>
    <span class="badge" style="background:#FFFBEB;color:#B8860B;border:1px solid #F0D080">HIGH PRI</span>
    <span class="meta">2h ago</span>
    <div class="actions">
      <button class="btn-xs" style="background:#1A7F4B;color:white">Approve</button>
      <button class="btn-xs" style="background:#C0392B;color:white">Reject</button>
    </div>
  </div>

  <div class="priority-row" style="border-left-color:#C0392B;background:#FFF5F5;border-bottom-color:#F0A99F">
    <svg class="flag" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#C0392B" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span class="title" style="color:#7A1A1A">Academic Integrity Report — CSE 531</span>
    <span class="badge" style="background:#FDECEB;color:#C0392B;border:1px solid #F0A99F">URGENT</span>
    <span class="meta">45m ago</span>
    <div class="actions">
      <button class="btn-xs" style="background:#C0392B;color:white">Escalate</button>
      <button class="btn-xs" style="background:#E8EAED;color:#4A5568">View</button>
    </div>
  </div>

  <div class="normal-row">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#B0B8C4" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span class="title">Lab Access Request — Room 214B</span>
    <span class="badge" style="background:#F4F5F7;color:#4A5568">PENDING</span>
    <span class="meta">Apr 30</span>
    <div class="actions">
      <button class="btn-xs" style="background:#1A7F4B;color:white">Approve</button>
      <button class="btn-xs" style="background:#C0392B;color:white">Reject</button>
    </div>
  </div>

  <div class="normal-row">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#B0B8C4" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span class="title" style="color:#8A95A3">Research Symposium RSVP — Chen, M.</span>
    <span class="badge" style="background:#EAF5EE;color:#1A7F4B">APPROVED</span>
    <span class="meta">Apr 28</span>
    <div class="actions">
      <button class="btn-xs" style="background:#E8EAED;color:#4A5568">View</button>
    </div>
  </div>
</body>
</html>
