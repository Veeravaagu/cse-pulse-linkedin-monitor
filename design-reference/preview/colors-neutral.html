<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: #F4F5F7; padding: 16px; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; }
  .chip { width: 72px; height: 40px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.07); }
  .name { font-size: 10px; font-weight: 600; color: #4A5568; margin-top: 3px; }
  .hex  { font-size: 10px; color: #8A95A3; font-family: 'IBM Plex Mono', monospace; }
  .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #8A95A3; margin-bottom: 6px; }
</style>
</head>
<body>
  <div class="section-label">Neutral Scale</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#FFFFFF;border:1px solid #DDE1E7"></div><div class="name">0 White</div><div class="hex">#FFFFFF</div></div>
    <div class="swatch"><div class="chip" style="background:#F9FAFB"></div><div class="name">50</div><div class="hex">#F9FAFB</div></div>
    <div class="swatch"><div class="chip" style="background:#F4F5F7"></div><div class="name">100 Page</div><div class="hex">#F4F5F7</div></div>
    <div class="swatch"><div class="chip" style="background:#E8EAED"></div><div class="name">200</div><div class="hex">#E8EAED</div></div>
    <div class="swatch"><div class="chip" style="background:#DDE1E7"></div><div class="name">300 Border</div><div class="hex">#DDE1E7</div></div>
    <div class="swatch"><div class="chip" style="background:#B0B8C4"></div><div class="name">400</div><div class="hex">#B0B8C4</div></div>
    <div class="swatch"><div class="chip" style="background:#8A95A3"></div><div class="name">500 Tertiary</div><div class="hex">#8A95A3</div></div>
    <div class="swatch"><div class="chip" style="background:#4A5568"></div><div class="name">600 Secondary</div><div class="hex">#4A5568</div></div>
    <div class="swatch"><div class="chip" style="background:#2D3748"></div><div class="name">700</div><div class="hex">#2D3748</div></div>
    <div class="swatch"><div class="chip" style="background:#1A202C"></div><div class="name">800</div><div class="hex">#1A202C</div></div>
    <div class="swatch"><div class="chip" style="background:#0D1117"></div><div class="name">900 Primary</div><div class="hex">#0D1117</div></div>
  </div>
</body>
</html>
